        <div class="stanza">
          <div class="line">
             I tore an empty
          </div>
          <div class="line">
            jacket of old  
          </div>
          <div class="line">
            friends; our
          </div>
        </div>

        <div class="stanza">
          <div class="line">
            tired shape and
          </div>
          <div class="line">
            night-streaked 
          </div>
          <div class="line">
            plates.  
          </div>
        </div>

        <div class="stanza">
          <div class="line">
            I knew it wasn’t
          </div>
          <div class="line">
            near to me, that
          </div>
          <div class="line">
            half of me was in
          </div>
        </div>

        <div class="stanza">
          <div class="line">
            a corner, where
          </div>
          <div class="line">
            the towels dried
          </div>
          <div class="line">
            or stood there.
          </div>
        </div>
      </div>
